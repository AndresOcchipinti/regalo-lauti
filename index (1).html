<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Para Lauti 💙💛</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;700&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --azul: #003087;
    --azul-oscuro: #001a4d;
    --oro: #FFCD00;
    --blanco: #ffffff;
  }
  html, body { min-height: 100vh; overflow-x: hidden; }
  body {
    background: var(--azul-oscuro);
    font-family: 'Barlow Condensed', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
    padding: 24px 16px 48px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(-45deg, transparent, transparent 28px, rgba(255,205,0,0.04) 28px, rgba(255,205,0,0.04) 30px);
    pointer-events: none;
    z-index: 0;
  }
  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
  .piece { position: absolute; top: -20px; animation: caer linear infinite; }
  @keyframes caer {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(105vh) rotate(800deg); opacity: 0; }
  }
  .wrapper {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: min(520px, 96vw);
    animation: aparecer 1s ease both;
  }
  @keyframes aparecer {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .franja-top { width: 100%; height: 18px; background: var(--oro); border-radius: 16px 16px 0 0; }
  .franja-bot { width: 100%; height: 18px; background: var(--oro); border-radius: 0 0 16px 16px; }
  .card {
    background: var(--azul);
    width: 100%;
    padding: 32px 32px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: '12';
    position: absolute;
    right: -18px; bottom: -30px;
    font-family: 'Anton', sans-serif;
    font-size: 200px;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }
  .escudo-wrap { animation: latido 2.4s ease-in-out infinite; }
  @keyframes latido {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.06); }
  }
  .escudo-wrap img { width: 130px; height: auto; display: block; }
  .club-label {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--oro);
    text-transform: uppercase;
    text-align: center;
  }
  .sep { width: 80px; height: 3px; background: var(--oro); border-radius: 2px; }
  .mensaje {
    font-family: 'Anton', sans-serif;
    font-size: clamp(24px, 5.5vw, 34px);
    color: var(--blanco);
    text-align: center;
    line-height: 1.25;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .mensaje .highlight {
    display: inline-block;
    background: var(--oro);
    color: var(--azul-oscuro);
    padding: 2px 14px;
    border-radius: 4px;
    margin-top: 6px;
  }
  /* Foto */
  .foto-frame {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 4px solid var(--oro);
    position: relative;
  }
  .foto-frame img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .foto-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,10,40,0.85));
    color: var(--oro);
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    padding: 16px 8px 10px;
  }
  /* Reproductor */
  .player {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,205,0,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .play-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--oro);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .play-btn:hover { transform: scale(1.08); }
  .play-btn svg { width: 18px; height: 18px; }
  .player-info { flex: 1; min-width: 0; }
  .player-title {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--oro);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
    letter-spacing: 1px;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--oro);
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
  }
  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .badge {
    background: transparent;
    border: 2px solid var(--oro);
    color: var(--oro);
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 999px;
  }
  .estrellas { font-size: 18px; color: var(--oro); letter-spacing: 6px; user-select: none; }
  .pie {
    margin-top: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>

</div>

<script>
  // Confetti
  (function(){
    var colors = ['#FFCD00','#ffffff','#003087','#ffe066','#001a4d'];
    var c = document.getElementById('confetti');
    for(var i=0;i<70;i++){
      var el=document.createElement('div');
      el.className='piece';
      var s=7+Math.random()*9;
      el.style.cssText=[
        'left:'+(Math.random()*100)+'vw',
        'width:'+s+'px','height:'+(s*1.3)+'px',
        'background:'+colors[Math.floor(Math.random()*colors.length)],
        'border-radius:'+(Math.random()>.5?'50%':'2px'),
        'animation-duration:'+(4+Math.random()*6)+'s',
        'animation-delay:'+(Math.random()*8)+'s'
      ].join(';');
      c.appendChild(el);
    }
  })();

  // Reproductor YouTube embed oculto
  var player, playing=false, progInterval;

  function onYTReady(){
    player = new YT.Player('ytplayer', {
      height:'1', width:'1',
      videoId:'dQw4w9WgXcQ', // placeholder, se reemplaza abajo
      playerVars:{autoplay:0, controls:0},
      events:{ onStateChange: onStateChange }
    });
    // Cargar el video de Boca
    setTimeout(function(){
      player.loadVideoById('5fAoAFQFqCY'); // "Vamos Boca no podemos perder"
    }, 800);
  }

  function onStateChange(e){
    if(e.data===1){ startProg(); }
    else { stopProg(); }
  }

  function togglePlay(){
    if(!player) return;
    if(playing){ player.pauseVideo(); playing=false; setIcon(false); }
    else { player.playVideo(); playing=true; setIcon(true); }
  }

  function setIcon(isPlaying){
    document.getElementById('playIcon').innerHTML = isPlaying
      ? '<rect x="6" y="4" width="4" height="16" fill="#003087"/><rect x="14" y="4" width="4" height="16" fill="#003087"/>'
      : '<polygon points="6,4 20,12 6,20" fill="#003087"/>';
  }

  function startProg(){
    stopProg();
    progInterval = setInterval(function(){
      if(!player || !player.getDuration) return;
      var pct = (player.getCurrentTime()/player.getDuration())*100;
      document.getElementById('progFill').style.width = pct+'%';
    }, 500);
  }
  function stopProg(){ clearInterval(progInterval); }

  // Cargar API YouTube
  var tag=document.createElement('script');
  tag.src='https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
  window.onYouTubeIframeAPIReady = onYTReady;
</script>

<div id="ytplayer" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;"></div>
