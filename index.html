<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Para Lauti 💙💛</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;700&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --azul: #003087;
    --azul-oscuro: #001a4d;
    --oro: #FFCD00;
    --oro-oscuro: #c9a000;
    --blanco: #ffffff;
  }

  html, body {
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    background: var(--azul-oscuro);
    font-family: 'Barlow Condensed', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* ── Fondo con patrón diagonal ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 28px,
        rgba(255,205,0,0.04) 28px,
        rgba(255,205,0,0.04) 30px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* ── Confetti ── */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  .piece {
    position: absolute;
    top: -20px;
    animation: caer linear infinite;
  }

  @keyframes caer {
    0%   { transform: translateY(0) rotate(0deg);    opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(105vh) rotate(800deg); opacity: 0; }
  }

  /* ── Wrapper central ── */
  .wrapper {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 32px 20px 48px;
    width: min(520px, 96vw);
    animation: aparecer 1s ease both;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Franja amarilla superior ── */
  .franja-top {
    width: 100%;
    height: 18px;
    background: var(--oro);
    border-radius: 16px 16px 0 0;
  }

  /* ── Tarjeta ── */
  .card {
    background: var(--azul);
    width: 100%;
    padding: 36px 36px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }

  /* marca de agua número 12 */
  .card::after {
    content: '12';
    position: absolute;
    right: -18px;
    bottom: -30px;
    font-family: 'Anton', sans-serif;
    font-size: 200px;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  /* ── Escudo SVG ── */
  .escudo-wrap {
    animation: latido 2.4s ease-in-out infinite;
  }

  @keyframes latido {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.05); }
  }

  /* ── Nombre del club ── */
  .club-label {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--oro);
    text-transform: uppercase;
    text-align: center;
  }

  /* ── Separador oro ── */
  .sep {
    width: 80px;
    height: 3px;
    background: var(--oro);
    border-radius: 2px;
  }

  /* ── Mensaje principal ── */
  .mensaje {
    font-family: 'Anton', sans-serif;
    font-size: clamp(26px, 6vw, 36px);
    color: var(--blanco);
    text-align: center;
    line-height: 1.25;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .mensaje .highlight {
    display: inline-block;
    background: var(--oro);
    color: var(--azul-oscuro);
    padding: 2px 12px;
    border-radius: 4px;
    margin-top: 6px;
  }

  /* ── Badges ── */
  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .badge {
    background: transparent;
    border: 2px solid var(--oro);
    color: var(--oro);
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 999px;
  }

  /* ── Franja amarilla inferior ── */
  .franja-bot {
    width: 100%;
    height: 18px;
    background: var(--oro);
    border-radius: 0 0 16px 16px;
  }

  /* ── Pie ── */
  .pie {
    margin-top: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }

  /* ── Estrellas decorativas ── */
  .estrellas {
    font-size: 18px;
    color: var(--oro);
    letter-spacing: 6px;
    user-select: none;
  }
</style>
</head>
<body>

<div id="confetti"></div>

<div class="wrapper">

  <div class="franja-top"></div>

  <div class="card">

    <div class="estrellas">★ ★ ★ ★ ★ ★</div>

    <div class="escudo-wrap">
      <svg width="110" height="110" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
        <!-- fondo escudo -->
        <ellipse cx="55" cy="55" rx="50" ry="50" fill="#001a4d" stroke="#FFCD00" stroke-width="3.5"/>
        <!-- franjas amarillas -->
        <rect x="18" y="40" width="74" height="10" fill="#FFCD00"/>
        <rect x="18" y="58" width="74" height="10" fill="#FFCD00"/>
        <!-- texto superior -->
        <text x="55" y="32" text-anchor="middle"
              font-family="Oswald, sans-serif" font-weight="700"
              font-size="8" fill="#FFCD00" letter-spacing="1.5">CLUB ATLÉTICO</text>
        <!-- texto inferior -->
        <text x="55" y="87" text-anchor="middle"
              font-family="Oswald, sans-serif" font-weight="700"
              font-size="8" fill="#FFCD00" letter-spacing="1.5">BOCA JUNIORS</text>
        <!-- estrellitas dentro -->
        <text x="55" y="100" text-anchor="middle"
              font-family="sans-serif" font-size="7" fill="#FFCD00">★ ★ ★ ★ ★ ★</text>
      </svg>
    </div>

    <div class="club-label">Club Atlético Boca Juniors</div>

    <div class="sep"></div>

    <div class="mensaje">
      De bostero a bostero<br/>
      para no pasar frío<br/>
      <span class="highlight">en el inviernito</span>
    </div>

    <div class="sep"></div>

    <div class="badges">
      <span class="badge">Para Lauti</span>
      <span class="badge">La mitad + 1</span>
      <span class="badge">Campeón de América</span>
    </div>

  </div>

  <div class="franja-bot"></div>

  <p class="pie">Xeneize · Pasión sin fin · 💙💛</p>

</div>

<script>
  (function(){
    var colors = ['#FFCD00','#ffffff','#003087','#ffe066','#001a4d'];
    var container = document.getElementById('confetti');
    for(var i = 0; i < 70; i++){
      var el = document.createElement('div');
      el.className = 'piece';
      var size = 7 + Math.random() * 9;
      el.style.cssText = [
        'left:' + (Math.random()*100) + 'vw',
        'width:' + size + 'px',
        'height:' + (size * 1.3) + 'px',
        'background:' + colors[Math.floor(Math.random()*colors.length)],
        'border-radius:' + (Math.random() > 0.5 ? '50%' : '2px'),
        'animation-duration:' + (4 + Math.random()*6) + 's',
        'animation-delay:' + (Math.random()*8) + 's'
      ].join(';');
      container.appendChild(el);
    }
  })();
</script>

</body>
</html>
